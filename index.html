<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Strategy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2d5a27; font-family: 'Arial', sans-serif; }
        
        /* Интерфейс как в Clash of Clans */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Верхняя панель с ресурсами */
        .top-bar {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.6); padding: 10px 20px;
            border-radius: 30px; border: 2px solid #ffcc00;
            color: white; font-weight: bold; display: flex; align-items: center;
            pointer-events: auto;
        }

        /* Левая панель с уровнем */
        .level-badge {
            position: absolute; top: 10px; left: 10px;
            background: #3498db; width: 50px; height: 50px;
            border-radius: 50%; border: 3px solid white;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Нижняя кнопка улучшения */
        .bottom-menu {
            position: absolute; bottom: 20px; right: 20px;
            pointer-events: auto;
        }

        .btn-upgrade {
            background: linear-gradient(to bottom, #44cc44, #228822);
            color: white; border: 3px solid white; padding: 15px 25px;
            border-radius: 15px; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 5px 0 #115511;
            text-transform: uppercase;
        }
        .btn-upgrade:active { transform: translateY(3px); box-shadow: 0 2px 0 #115511; }

        #timer-box {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); color: white; padding: 5px 15px;
            border-radius: 10px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="level-badge" id="level">1</div>
        
        <div class="top-bar">
            <span id="balance">0</span>&nbsp;<span style="color: #ffcc00;">💵</span>
        </div>

        <div id="timer-box">Доход через: <span id="timer">05:00</span></div>

        <div class="bottom-menu">
            <button class="btn-upgrade" onclick="upgrade()">Улучшить<br><span id="cost" style="font-size: 12px;">100 $</span></button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 0;
        let level = 1;
        let upgradeCost = 100;
        let secondsLeft = 300;

        // --- 3D СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x55aaff); // Голубое небо

        // Камера под углом (Clash of Clans style)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 12, 10); // Позиция сверху-сбоку
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Трава
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x44aa44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка для реализма
        const grid = new THREE.GridHelper(50, 25, 0x336633, 0x336633);
        grid.position.y = 0.05;
        scene.add(grid);

        const houseGroup = new THREE.Group();
        scene.add(houseGroup);

        function createHouse(lvl) {
            while(houseGroup.children.length > 0) houseGroup.remove(houseGroup.children[0]);

            // Основное здание (Белый кирпич)
            const bodyGeo = new THREE.BoxGeometry(3, 2 + (lvl*0.3), 3);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = (2 + (lvl*0.3)) / 2;
            body.castShadow = true;
            houseGroup.add(body);

            // Крыша
            const roofGeo = new THREE.ConeGeometry(2.5, 2, 4);
            const roofMat = new THREE.MeshPhongMaterial({ color: 0xaa3333 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = (2 + (lvl*0.3)) + 1;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            houseGroup.add(roof);

            // Дверь
            const doorGeo = new THREE.PlaneGeometry(0.8, 1.2);
            const doorMat = new THREE.MeshPhongMaterial({ color: 0x5d4037 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 0.6, 1.51);
            houseGroup.add(door);
        }

        createHouse(level);

        function upgrade() {
            if (balance >= upgradeCost) {
                balance -= upgradeCost;
                level++;
                upgradeCost = Math.floor(upgradeCost * 2.2);
                createHouse(level);
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('level').innerText = level;
            document.getElementById('cost').innerText = `${upgradeCost} $`;
        }

        function animate() {
            requestAnimationFrame(animate);
            // Дом больше не крутится сам! 
            renderer.render(scene, camera);
        }

        // Таймер дохода
        setInterval(() => {
            secondsLeft--;
            if(secondsLeft <= 0) {
                balance += 50 * level;
                secondsLeft = 300;
                tg.HapticFeedback.impactOccurred('medium');
            }
            let mins = Math.floor(secondsLeft / 60);
            let secs = secondsLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            updateUI();
        }, 1000);

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
