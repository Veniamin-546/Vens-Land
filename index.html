<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Build & Wait</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 12px; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        #stats { position: absolute; top: 15px; left: 15px; padding: 10px 20px; border-left: 5px solid #2ecc71; font-weight: bold; }
        
        /* Кнопка постройки прямо в мире */
        #context-menu { 
            position: absolute; display: none; transform: translate(-50%, -100%); 
            padding: 10px; z-index: 100; pointer-events: auto;
        }
        .btn-build { 
            background: #2ecc71; color: white; border: none; padding: 10px 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
        }

        /* Индикатор стройки */
        .progress-container {
            position: absolute; width: 60px; height: 10px; background: rgba(0,0,0,0.5);
            border-radius: 5px; overflow: hidden; display: none;
        }
        .progress-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats" class="glass">БАЛАНС: <span id="balance" style="color:#2ecc71">0</span> $</div>

        <div id="context-menu" class="glass">
            <button class="btn-build" onclick="confirmBuild()">ПОСТРОИТЬ (100$)</button>
        </div>

        <div id="progress-ui" class="progress-container">
            <div id="p-bar" class="progress-bar"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000000;
        let selectedPos = { x: 0, z: 0 };
        let isBuilding = false;

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x55aa44 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const buildings = new THREE.Group();
        scene.add(buildings);

        // --- ЛОГИКА ВЗАИМОДЕЙСТВИЯ ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (isBuilding) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const pos = intersects[0].point;
                selectedPos.x = Math.round(pos.x / 2) * 2;
                selectedPos.z = Math.round(pos.z / 2) * 2;

                // Показываем кнопку в месте клика
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = event.clientX + 'px';
                menu.style.top = event.clientY + 'px';
            } else {
                document.getElementById('context-menu').style.display = 'none';
            }
        });

        function confirmBuild() {
            if (balance < 100) return alert("Мало баксов!");
            
            balance -= 100;
            isBuilding = true;
            document.getElementById('context-menu').style.display = 'none';
            updateUI();

            // Показываем полоску загрузки
            const pContainer = document.getElementById('progress-ui');
            const pBar = document.getElementById('p-bar');
            
            // Позиционируем полоску над точкой
            pContainer.style.display = 'block';
            pContainer.style.left = (window.innerWidth / 2) + "px"; // Упростим для теста
            pContainer.style.top = (window.innerHeight / 2) + "px";

            let progress = 0;
            let interval = setInterval(() => {
                progress += 2;
                pBar.style.width = progress + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    finishBuilding();
                }
            }, 100); // 100 мс * 50 итераций = 5 секунд
        }

        function finishBuilding() {
            const house = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.4, 1.6), new THREE.MeshStandardMaterial({color: 0xffffff}));
            body.position.y = 0.7;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(1.3, 0.8, 4), new THREE.MeshStandardMaterial({color: 0xaa3333}));
            roof.position.y = 1.5;
            roof.rotation.y = Math.PI/4;
            
            house.add(body, roof);
            house.position.set(selectedPos.x, 0, selectedPos.z);
            buildings.add(house);

            document.getElementById('progress-ui').style.display = 'none';
            document.getElementById('p-bar').style.width = "0%";
            isBuilding = false;
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
