<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global City 3D - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .ui-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
        .pointer-events-auto { pointer-events: auto; }
        
        .resource-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .shop-btn {
            background: rgba(30, 41, 59, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .shop-btn:hover { transform: translateY(-5px); background: #3b82f6; }
        .shop-btn.active { border-color: #fbbf24; background: #2563eb; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .price-tag {
            position: absolute; bottom: -8px; background: #fbbf24; color: #000;
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 10px;
        }

        #loading {
            position: fixed; inset: 0; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        
        .floating-income {
            position: absolute; color: #fbbf24; font-weight: bold;
            pointer-events: none; animation: floatUp 1.5s forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="text-6xl mb-6">🏗️</div>
        <div class="text-2xl font-black tracking-widest animate-pulse text-blue-400">BUILDING YOUR EMPIRE...</div>
        <div class="mt-2 text-slate-400 text-sm">Настройка освещения и сетки</div>
    </div>

    <div class="ui-overlay">
        <!-- Ресурсы -->
        <div class="p-4 flex justify-between items-start">
            <div class="flex gap-4 pointer-events-auto">
                <div class="resource-card">
                    <div class="text-[10px] uppercase text-blue-300 font-bold tracking-tighter">Бюджет</div>
                    <div id="gold-display" class="text-2xl font-black text-yellow-400">2,500</div>
                </div>
                <div class="resource-card">
                    <div class="text-[10px] uppercase text-blue-300 font-bold tracking-tighter">Жители</div>
                    <div id="pop-display" class="text-2xl font-black text-blue-400">0</div>
                </div>
                <div class="resource-card">
                    <div class="text-[10px] uppercase text-blue-300 font-bold tracking-tighter">Энергия</div>
                    <div id="power-display" class="text-2xl font-black text-green-400">0/0</div>
                </div>
            </div>
            
            <div class="resource-card pointer-events-auto text-center min-w-[100px] border-yellow-500/30">
                <div class="text-[10px] uppercase text-yellow-500 font-bold">Уровень</div>
                <div id="level-display" class="text-3xl font-black text-white">1</div>
            </div>
        </div>

        <!-- Меню строительства -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-3 pointer-events-auto bg-slate-900/80 p-5 rounded-[2.5rem] backdrop-blur-xl border border-white/10 shadow-2xl">
            <button onclick="selectTool('road')" id="btn-road" class="shop-btn w-16 h-16 rounded-2xl flex flex-col items-center justify-center">
                <span class="text-2xl">🛣️</span>
                <span class="text-[9px] font-bold mt-1">ДОРОГА</span>
                <span class="price-tag">💰50</span>
            </button>
            <button onclick="selectTool('house')" id="btn-house" class="shop-btn w-16 h-16 rounded-2xl flex flex-col items-center justify-center">
                <span class="text-2xl">🏠</span>
                <span class="text-[9px] font-bold mt-1">ЖИЛЬЁ</span>
                <span class="price-tag">💰200</span>
            </button>
            <button onclick="selectTool('skyscraper')" id="btn-skyscraper" class="shop-btn w-16 h-16 rounded-2xl flex flex-col items-center justify-center">
                <span class="text-2xl">🏙️</span>
                <span class="text-[9px] font-bold mt-1">ОФИС</span>
                <span class="price-tag">💰1200</span>
            </button>
            <button onclick="selectTool('power')" id="btn-power" class="shop-btn w-16 h-16 rounded-2xl flex flex-col items-center justify-center">
                <span class="text-2xl">⚡</span>
                <span class="text-[9px] font-bold mt-1">ЭНЕРГИЯ</span>
                <span class="price-tag">💰400</span>
            </button>
        </div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const state = {
            gold: 2500,
            pop: 0,
            powerUsed: 0,
            powerMax: 0,
            level: 1,
            selectedTool: null,
            isMouseDown: false
        };

        const config = {
            road: { cost: 50, color: 0x334155, height: 0.1, label: 'Дорога' },
            house: { cost: 200, pop: 100, power: 20, color: 0xe2e8f0, height: 1.8, label: 'Жилой дом' },
            skyscraper: { cost: 1200, pop: 500, power: 100, color: 0x0ea5e9, height: 5, label: 'Небоскреб' },
            power: { cost: 400, pop: 0, power: -150, color: 0xf59e0b, height: 2.5, label: 'Электростанция' }
        };

        // --- THREE.JS ---
        let scene, camera, renderer, raycaster, mouse;
        let ground, mapGroup;
        let buildings = [];
        let roads = [];
        let roadMap = new Map();
        let vehicles = [];
        let citizens = [];
        const gridSize = 30;
        const cellSize = 2;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.FogExp2(0x0f172a, 0.01);

            const aspect = window.innerWidth / window.innerHeight;
            const d = 25;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(40, 40, 40);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // --- ДОБАВЛЕНО ОСВЕЩЕНИЕ ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.6)); // Базовый мягкий свет
            
            const sun = new THREE.DirectionalLight(0xffffff, 1.5); // Яркое солнце
            sun.position.set(30, 60, 40);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.left = -60;
            sun.shadow.camera.right = 60;
            sun.shadow.camera.top = 60;
            sun.shadow.camera.bottom = -60;
            scene.add(sun);

            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x14532d, 0.4); // Свет от неба и земли
            scene.add(hemiLight);

            createBaseWorld();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', () => state.isMouseDown = true);
            window.addEventListener('mouseup', () => state.isMouseDown = false);
            window.addEventListener('click', handleInput);
            
            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function createBaseWorld() {
            mapGroup = new THREE.Group();
            scene.add(mapGroup);

            const groundGeo = new THREE.PlaneGeometry(gridSize * cellSize, gridSize * cellSize);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x14532d, roughness: 0.8 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            mapGroup.add(ground);

            // --- СЕТКА ПОМЕЧЕНА ЧЕРНЫМ ---
            const grid = new THREE.GridHelper(gridSize * cellSize, gridSize, 0x000000, 0x000000);
            grid.material.opacity = 0.2; // Чуть заметнее, так как черная
            grid.material.transparent = true;
            grid.position.y = 0.02;
            scene.add(grid);
        }

        function selectTool(tool) {
            state.selectedTool = tool;
            document.querySelectorAll('.shop-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tool).classList.add('active');
        }

        function handleInput(event) {
            if (event.target.closest('.pointer-events-auto')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0 && state.selectedTool) {
                const point = intersects[0].point;
                const x = Math.round(point.x / cellSize) * cellSize;
                const z = Math.round(point.z / cellSize) * cellSize;
                
                if (!isOccupied(x, z)) {
                    if (state.selectedTool === 'road') buildRoad(x, z);
                    else buildBuilding(state.selectedTool, x, z);
                }
            }
        }

        function isOccupied(x, z) {
            const key = `${x},${z}`;
            return buildings.some(b => b.position.x === x && b.position.z === z) || roadMap.has(key);
        }

        function buildRoad(x, z) {
            if (state.gold < config.road.cost) return showNotice("Мало золота!");
            state.gold -= config.road.cost;

            const geo = new THREE.BoxGeometry(cellSize, 0.05, cellSize);
            const mat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
            const road = new THREE.Mesh(geo, mat);
            road.position.set(x, 0.03, z);
            road.receiveShadow = true;
            scene.add(road);
            
            const key = `${x},${z}`;
            roadMap.set(key, road);
            roads.push(road);

            const stripeGeo = new THREE.BoxGeometry(0.1, 0.01, 1);
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const stripe = new THREE.Mesh(stripeGeo, stripeMat);
            stripe.position.set(0, 0.031, 0);
            road.add(stripe);

            if (vehicles.length < roads.length * 0.5) {
                spawnVehicle(x, z);
            }
            updateUI();
        }

        function spawnVehicle(x, z) {
            const colors = [0xef4444, 0x3b82f6, 0xfacc15, 0xffffff];
            const vGroup = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.4, 1),
                new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
            );
            body.position.y = 0.2;
            body.castShadow = true;
            vGroup.add(body);

            const glass = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.2, 0.4),
                new THREE.MeshBasicMaterial({ color: 0x334155 })
            );
            glass.position.set(0, 0.4, 0.1);
            vGroup.add(glass);

            vGroup.position.set(x, 0.1, z);
            
            vGroup.userData = { 
                currentX: x, 
                currentZ: z,
                targetX: x,
                targetZ: z,
                moving: false,
                speed: 0.08,
                lastDir: null
            };
            
            scene.add(vGroup);
            vehicles.push(vGroup);
        }

        function updateVehicles() {
            vehicles.forEach(v => {
                const ud = v.userData;
                if (!ud.moving) {
                    const neighbors = [
                        { x: ud.currentX + cellSize, z: ud.currentZ, dir: 'east', rot: Math.PI / 2 },
                        { x: ud.currentX - cellSize, z: ud.currentZ, dir: 'west', rot: -Math.PI / 2 },
                        { x: ud.currentX, z: ud.currentZ + cellSize, dir: 'south', rot: 0 },
                        { x: ud.currentX, z: ud.currentZ - cellSize, dir: 'north', rot: Math.PI }
                    ];

                    let validPaths = neighbors.filter(p => roadMap.has(`${p.x},${p.z}`));
                    if (validPaths.length > 1 && ud.lastDir) {
                        const opposite = { 'east': 'west', 'west': 'east', 'north': 'south', 'south': 'north' };
                        validPaths = validPaths.filter(p => p.dir !== opposite[ud.lastDir]);
                    }

                    if (validPaths.length > 0) {
                        const next = validPaths[Math.floor(Math.random() * validPaths.length)];
                        ud.targetX = next.x;
                        ud.targetZ = next.z;
                        ud.lastDir = next.dir;
                        ud.moving = true;
                        v.rotation.y = next.rot;
                    }
                } else {
                    const dx = ud.targetX - v.position.x;
                    const dz = ud.targetZ - v.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < 0.1) {
                        v.position.set(ud.targetX, 0.1, ud.targetZ);
                        ud.currentX = ud.targetX;
                        ud.currentZ = ud.targetZ;
                        ud.moving = false;
                    } else {
                        v.position.x += (dx / dist) * ud.speed;
                        v.position.z += (dz / dist) * ud.speed;
                    }
                }
            });
        }

        function buildBuilding(type, x, z) {
            const data = config[type];
            if (state.gold < data.cost) return showNotice("Мало золота!");
            if (data.power > 0 && (state.powerMax - state.powerUsed < data.power)) return showNotice("Нужна энергия!");

            state.gold -= data.cost;
            state.pop += data.pop || 0;
            if (data.power < 0) state.powerMax += Math.abs(data.power);
            else state.powerUsed += data.power;

            const bGroup = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(cellSize * 0.8, data.height, cellSize * 0.8),
                new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.3, metalness: 0.2 })
            );
            body.position.y = data.height / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            bGroup.add(body);

            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(cellSize * 0.85, 0.2, cellSize * 0.85),
                new THREE.MeshStandardMaterial({ color: 0x334155 })
            );
            roof.position.y = data.height;
            bGroup.add(roof);

            const winRows = Math.floor(data.height * 2);
            for(let i=0; i<winRows; i++) {
                const win = new THREE.Mesh(
                    new THREE.BoxGeometry(cellSize * 0.82, 0.1, cellSize * 0.82),
                    new THREE.MeshBasicMaterial({ color: 0xbae6fd, transparent: true, opacity: 0.6 })
                );
                win.position.y = 0.4 + (i * 0.4);
                bGroup.add(win);
            }

            bGroup.position.set(x, 0, z);
            bGroup.scale.set(0.01, 0.01, 0.01);
            scene.add(bGroup);
            buildings.push(bGroup);

            let s = 0.01;
            const interval = setInterval(() => {
                s += 0.05;
                bGroup.scale.set(s, s, s);
                if (s >= 1) clearInterval(interval);
            }, 16);

            if (type === 'house' || type === 'skyscraper') {
                for(let i=0; i<3; i++) spawnCitizen(x, z);
            }
            updateUI();
        }

        function spawnCitizen(x, z) {
            const citizen = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xffdbac })
            );
            citizen.position.set(x + (Math.random()-0.5)*1.5, 0.2, z + (Math.random()-0.5)*1.5);
            citizen.userData = { 
                homeX: x, homeZ: z, 
                angle: Math.random() * Math.PI * 2,
                radius: 0.5 + Math.random() * 1
            };
            scene.add(citizen);
            citizens.push(citizen);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateVehicles();
            citizens.forEach(c => {
                c.userData.angle += 0.02;
                c.position.x = c.userData.homeX + Math.cos(c.userData.angle) * c.userData.radius;
                c.position.z = c.userData.homeZ + Math.sin(c.userData.angle) * c.userData.radius;
                c.rotation.y += 0.05;
            });
            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('gold-display').innerText = Math.floor(state.gold).toLocaleString();
            document.getElementById('pop-display').innerText = state.pop.toLocaleString();
            document.getElementById('power-display').innerText = `${state.powerUsed}/${state.powerMax}`;
            document.getElementById('level-display').innerText = state.level;
        }

        function showNotice(text) {
            const n = document.createElement('div');
            n.className = 'fixed top-32 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-2 rounded-full z-50 font-bold shadow-lg pointer-events-none';
            n.innerText = text;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 25;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        setInterval(() => {
            state.gold += (state.pop * 0.05) + (state.level * 10);
            updateUI();
        }, 2000);

        window.onload = init;
    </script>
</body>
</html>
