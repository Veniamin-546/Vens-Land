<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Build System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 15px; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        #stats-panel { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; padding: 10px 20px; border: 2px solid #2ecc71; }
        #hint { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; display: none; }

        #menu { position: absolute; bottom: 20px; left: 10px; right: 10px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-buy { background: #2ecc71; box-shadow: 0 4px 0 #27ae60; }
        .btn-sell { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats-panel" class="glass">
            <div style="font-weight: bold;">VENS LAND</div>
            <div style="color: #27ae60; font-weight: 900;"><span id="balance">0</span> $</div>
        </div>

        <div id="hint">ВЫБЕРИ МЕСТО НА ЗЕМЛЕ</div>

        <div id="menu">
            <button class="btn btn-buy" onclick="enableBuildMode()">🏠 КУПИТЬ ДОМ (100$)</button>
            <button class="btn btn-sell" onclick="sellLast()">💰 ПРОДАТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000000; // Твой баланс для теста
        let isBuildMode = false;

        // --- THREE.JS СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Земля
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x55aa44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка
        const grid = new THREE.GridHelper(40, 20, 0x3d7a32, 0x3d7a32);
        grid.position.y = 0.02;
        scene.add(grid);

        const buildings = new THREE.Group();
        scene.add(buildings);

        // --- ЛОГИКА ---
        function enableBuildMode() {
            if (balance >= 100) {
                isBuildMode = true;
                document.getElementById('hint').style.display = 'block';
                tg.HapticFeedback.impactOccurred('light');
            } else {
                alert("Недостаточно денег!");
            }
        }

        // Обработка клика по земле
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (event) => {
            if (!isBuildMode) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const pos = intersects[0].point;
                // Привязка к сетке (шаг 2 метра)
                const gridX = Math.round(pos.x / 2) * 2;
                const gridZ = Math.round(pos.z / 2) * 2;

                addHouse(gridX, gridZ);
            }
        });

        function addHouse(x, z) {
            // Создаем реалистичный домик
            const house = new THREE.Group();
            
            // Стены
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 1.5, 1.8), 
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            body.position.y = 0.75;
            body.castShadow = true;

            // Крыша
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(1.4, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0xaa3333 })
            );
            roof.position.y = 1.75;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;

            house.add(body, roof);
            house.position.set(x, 0, z);
            
            buildings.add(house);
            
            balance -= 100;
            isBuildMode = false;
            document.getElementById('hint').style.display = 'none';
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function sellLast() {
            if (buildings.children.length > 0) {
                buildings.remove(buildings.children[buildings.children.length - 1]);
                balance += 70; // Возвращаем 70%
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        updateUI();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
