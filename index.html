<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Build & Sell</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: 'Helvetica Neue', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); pointer-events: auto; }
        
        #top-info { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; padding: 12px 20px; }
        .currency { color: #27ae60; font-weight: 800; font-size: 20px; }

        /* Нижнее меню */
        #bottom-menu { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; display: flex; gap: 10px; justify-content: center; }
        
        .btn-action { flex: 1; background: #1a1a1a; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-sell { background: #e74c3c; }
        .btn-build { background: #2ecc71; }
        .btn-action:active { transform: scale(0.95); }

        #build-instruction { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="top-info" class="glass">
            <div>VENS LAND</div>
            <div class="currency"><span id="balance">0</span> $</div>
        </div>

        <div id="build-instruction">ТЫКНИ НА ТРАВУ, ЧТОБЫ ПОСТАВИТЬ ДОМ</div>

        <div id="bottom-menu">
            <button class="btn-action btn-build" onclick="startBuildMode()">➕ ПОСТРОИТЬ</button>
            <button class="btn-action btn-sell" onclick="sellSelected()">💰 ПРОДАТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = Number(localStorage.getItem('vens_balance')) || 1000000;
        let buildings = JSON.parse(localStorage.getItem('vens_buildings')) || [];
        let isBuildMode = false;

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa2d2ff);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Земля с сеткой
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x55aa44, roughness: 0.8 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(40, 20, 0x448833, 0x448833);
        grid.position.y = 0.01;
        scene.add(grid);

        // Группа для всех домов
        const buildingsGroup = new THREE.Group();
        scene.add(buildingsGroup);

        // --- ФУНКЦИИ СТРОИТЕЛЬСТВА ---
        function createHouseModel(lvl) {
            const group = new THREE.Group();
            const wall = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: 0xffffff}));
            wall.position.y = 1;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(1.5, 1, 4), new THREE.MeshStandardMaterial({color: 0xaa3333}));
            roof.position.y = 2.5;
            roof.rotation.y = Math.PI / 4;
            group.add(wall, roof);
            group.castShadow = true;
            return group;
        }

        function startBuildMode() {
            if(balance < 1000) { alert("Мало денег!"); return; }
            isBuildMode = true;
            document.getElementById('build-instruction').style.display = 'block';
        }

        // Клик по миру
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (!isBuildMode) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const pt = intersects[0].point;
                // Привязка к сетке (шаг 2 метра)
                const x = Math.round(pt.x / 2) * 2;
                const z = Math.round(pt.z / 2) * 2;

                placeHouse(x, z);
            }
        });

        function placeHouse(x, z) {
            const house = createHouseModel(1);
            house.position.set(x, 0, z);
            buildingsGroup.add(house);
            
            balance -= 1000;
            isBuildMode = false;
            document.getElementById('build-instruction').style.display = 'none';
            save();
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function sellSelected() {
            if(buildingsGroup.children.length > 0) {
                buildingsGroup.remove(buildingsGroup.children[buildingsGroup.children.length - 1]);
                balance += 700;
                save();
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            localStorage.setItem('vens_balance', balance);
        }

        function save() {
            // Тут можно сохранять массив координат домов
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        animate();
        updateUI();
    </script>
</body>
</html>
