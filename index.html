<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 15px; pointer-events: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.5); }
        #stats-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; padding: 12px 20px; }
        .val { font-weight: 900; font-size: 18px; color: #2ecc71; }
        .menu-popup { position: absolute; display: none; transform: translate(-50%, -120%); padding: 12px; z-index: 1000; text-align: center; min-width: 160px; }
        .btn-opt { width: 100%; margin: 5px 0; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 12px; }
        .btn-house { background: #3498db; }
        .btn-shop { background: #9b59b6; }
        .btn-upgrade { background: #f1c40f; color: #000; }
        .btn-sell { background: #e74c3c; }
        #timer-label { position: absolute; display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 15px 30px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats-bar" class="glass">
            <div>БАЛАНС: <span id="balance" class="val">0</span> $</div>
            <div>ДОХОД/МИН: <span id="income" class="val" style="color:#3498db">0</span> $</div>
        </div>

        <div id="empty-menu" class="menu-popup glass">
            <button class="btn-opt btn-house" onclick="startBuild('house')">ПОСТРОИТЬ ДОМ (100$)</button>
            <button class="btn-opt btn-shop" onclick="startBuild('shop')">ПОСТРОИТЬ МАГАЗИН (300$)</button>
        </div>

        <div id="object-menu" class="menu-popup glass">
            <div id="obj-info" style="font-size: 10px; margin-bottom: 5px; color: #666;">УРОВЕНЬ 1</div>
            <button class="btn-opt btn-upgrade" id="up-btn" onclick="upgradeObject()">УЛУЧШИТЬ</button>
            <button class="btn-opt btn-sell" onclick="sellObject()">ПРОДАТЬ</button>
        </div>

        <div id="timer-label">СТРОЙКА: 5с</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000000;
        let incomePerMin = 0;
        let isBuilding = false;
        let selectedCell = null; 
        let selectedObject = null;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 22, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(15, 30, 15);
        sun.castShadow = true;
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(50, 25, 0xffffff, 0x2d5a27));

        const buildingsGroup = new THREE.Group();
        scene.add(buildingsGroup);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects([ground, ...buildingsGroup.children], true);
            document.getElementById('empty-menu').style.display = 'none';
            document.getElementById('object-menu').style.display = 'none';

            if (intersects.length > 0) {
                let buildObj = null;
                intersects[0].object.traverseAncestors(a => { if(a.userData.type) buildObj = a; });

                if (buildObj) {
                    selectedObject = buildObj;
                    const menu = document.getElementById('object-menu');
                    document.getElementById('obj-info').innerText = `${buildObj.userData.type.toUpperCase()} - LVL ${buildObj.userData.lvl}`;
                    document.getElementById('up-btn').innerText = buildObj.userData.lvl >= 3 ? "МАКС. УРОВЕНЬ" : `УЛУЧШИТЬ (${(buildObj.userData.type === 'house' ? 200 : 500) * buildObj.userData.lvl}$)`;
                    menu.style.display = 'block';
                    menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
                } else {
                    if(isBuilding) return;
                    selectedCell = { x: Math.round(intersects[0].point.x/2)*2, z: Math.round(intersects[0].point.z/2)*2 };
                    const menu = document.getElementById('empty-menu');
                    menu.style.display = 'block';
                    menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
                }
            }
        });

        function startBuild(type) {
            const cost = type === 'house' ? 100 : 300;
            if (balance < cost) return;
            balance -= cost;
            isBuilding = true;
            document.getElementById('empty-menu').style.display = 'none';
            updateUI();
            const timer = document.getElementById('timer-label');
            timer.style.display = 'block';
            let time = type === 'house' ? 5 : 8;
            let int = setInterval(() => {
                time--; timer.innerText = `СТРОЙКА: ${time}с`;
                if(time <= 0) { clearInterval(int); timer.style.display = 'none'; spawnObject(selectedCell.x, selectedCell.z, type); isBuilding = false; }
            }, 1000);
        }

        function spawnObject(x, z, type, lvl = 1) {
            const group = new THREE.Group();
            group.userData = { type, lvl, x, z };
            group.position.set(x, 0, z);
            updateModel(group);
            buildingsGroup.add(group);
            incomePerMin += type === 'house' ? 10 : 30;
            updateUI();
        }

        function updateModel(group) {
            while(group.children.length > 0) group.remove(group.children[0]);
            const type = group.userData.type;
            const lvl = group.userData.lvl;

            if (type === 'house') {
                if (lvl === 1) { // Лачуга
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1, 1.4), new THREE.MeshStandardMaterial({color:0xe6ccb2}));
                    b.position.y = 0.5; group.add(b);
                } else if (lvl === 2) { // Коттедж
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.8, 1.6), new THREE.MeshStandardMaterial({color:0xffffff}));
                    b.position.y = 0.9;
                    const r = new THREE.Mesh(new THREE.ConeGeometry(1.3, 1, 4), new THREE.MeshStandardMaterial({color:0xaa3333}));
                    r.position.y = 2.3; r.rotation.y = Math.PI/4;
                    group.add(b, r);
                } else { // Вилла
                    const b1 = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 3), new THREE.MeshStandardMaterial({color:0xffffff}));
                    b1.position.y = 0.6;
                    const b2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.5), new THREE.MeshStandardMaterial({color:0x333333}));
                    b2.position.set(0, 1.8, 0);
                    const win = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.6), new THREE.MeshStandardMaterial({color:0x88ccff, transparent:true, opacity:0.6}));
                    win.position.set(0, 1.8, 0);
                    group.add(b1, b2, win);
                }
            } else { // SHOP
                if (lvl === 1) { // Палатка
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.2, 1.4), new THREE.MeshStandardMaterial({color:0x3498db}));
                    b.position.y = 0.6; group.add(b);
                } else if (lvl === 2) { // Магазин
                    const b = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.6, 1.8), new THREE.MeshStandardMaterial({color:0xeeeeee}));
                    b.position.y = 0.8;
                    const sign = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.2), new THREE.MeshStandardMaterial({color:0xf1c40f}));
                    sign.position.set(0, 1.4, 0.95);
                    group.add(b, sign);
                } else { // Супермаркет
                    const b = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 2.5), new THREE.MeshStandardMaterial({color:0x2c3e50}));
                    b.position.y = 1;
                    const glass = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1, 1), new THREE.MeshStandardMaterial({color:0x88ccff, transparent:true, opacity:0.7}));
                    glass.position.set(0, 1, 0.8);
                    group.add(b, glass);
                }
            }
            group.traverse(m => { if(m.isMesh) { m.castShadow = m.receiveShadow = true; }});
        }

        function upgradeObject() {
            const obj = selectedObject;
            if (obj.userData.lvl >= 3) return;
            const cost = (obj.userData.type === 'house' ? 200 : 500) * obj.userData.lvl;
            if (balance < cost) return;

            balance -= cost;
            obj.userData.lvl++;
            incomePerMin += obj.userData.type === 'house' ? 20 : 50;
            updateModel(obj);
            document.getElementById('object-menu').style.display = 'none';
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function sellObject() {
            incomePerMin -= (selectedObject.userData.type === 'house' ? 10 : 30) * selectedObject.userData.lvl;
            balance += (selectedObject.userData.type === 'house' ? 70 : 200);
            buildingsGroup.remove(selectedObject);
            document.getElementById('object-menu').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('income').innerText = incomePerMin;
        }

        setInterval(() => { balance += incomePerMin; updateUI(); }, 60000);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        updateUI(); animate();
    </script>
</body>
</html>
