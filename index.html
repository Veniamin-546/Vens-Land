<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Reality</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Helvetica', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Реалистичный интерфейс: минимализм и стекло */
        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            pointer-events: auto;
        }

        #stats { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 10px; }
        #level-info { position: absolute; top: 20px; left: 20px; border-left: 4px solid #ffcc00; }

        .btn-build {
            position: absolute; bottom: 30px; right: 20px;
            background: #ffffff; color: #000; border: none;
            padding: 18px 35px; border-radius: 8px;
            font-weight: 900; font-size: 16px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            pointer-events: auto; transition: 0.2s;
        }
        .btn-build:active { transform: scale(0.95); background: #eee; }

        #timer { position: absolute; bottom: 30px; left: 20px; font-size: 12px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="level-info" class="glass-panel">РАЙОН: <span id="level">1</span></div>
        <div id="stats" class="glass-panel">
            <span style="opacity: 0.6; font-size: 12px;">БАЛАНС:</span>
            <span id="balance" style="color: #2ecc71; font-weight: bold;">0</span>
            <span style="color: #ffcc00;">$</span>
        </div>
        <div id="timer">СЛЕДУЮЩЕЕ ПОСТУПЛЕНИЕ: <span id="time-val">05:00</span></div>
        <button class="btn-build" onclick="upgrade()">Улучшить объект — <span id="cost">100</span>$</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 0;
        let level = 1;
        let upgradeCost = 100;
        let secondsLeft = 300;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Для реалистичного света
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- REALISTIC LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(10, 20, 10);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        // --- GROUND (Asphalt/Concrete) ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const houseGroup = new THREE.Group();
        scene.add(houseGroup);

        function createRealisticHouse(lvl) {
            while(houseGroup.children.length > 0) houseGroup.remove(houseGroup.children[0]);

            // Фундамент
            const baseGeo = new THREE.BoxGeometry(4.2, 0.3, 4.2);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.15;
            base.receiveShadow = true;
            houseGroup.add(base);

            // Стены (Тёмный современный кирпич/бетон)
            const wallHeight = 2.5 + (lvl * 0.2);
            const wallsGeo = new THREE.BoxGeometry(4, wallHeight, 4);
            const wallsMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
            const walls = new THREE.Mesh(wallsGeo, wallsMat);
            walls.position.y = wallHeight / 2 + 0.3;
            walls.castShadow = true;
            houseGroup.add(walls);

            // Крыша (Плоская современная или скатная)
            const roofGeo = new THREE.BoxGeometry(4.2, 0.4, 4.2);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = wallHeight + 0.5;
            houseGroup.add(roof);

            // Окна (Светящиеся)
            const winGeo = new THREE.PlaneGeometry(0.8, 1.2);
            const winMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffaa, 
                emissive: 0xffffaa, 
                emissiveIntensity: 0.5 
            });
            for(let i=0; i<4; i++) {
                const windowMesh = new THREE.Mesh(winGeo, winMat);
                windowMesh.position.set(1, 1.5, 2.01);
                houseGroup.add(windowMesh);
            }
        }

        createRealisticHouse(level);

        // --- LOGIC ---
        function upgrade() {
            if (balance >= upgradeCost) {
                balance -= upgradeCost;
                level++;
                upgradeCost = Math.floor(upgradeCost * 2.5);
                createRealisticHouse(level);
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('level').innerText = level;
            document.getElementById('cost').innerText = upgradeCost;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        setInterval(() => {
            secondsLeft--;
            if(secondsLeft <= 0) {
                balance += 100 * level;
                secondsLeft = 300;
            }
            let mins = Math.floor(secondsLeft / 60);
            let secs = secondsLeft % 60;
            document.getElementById('time-val').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            updateUI();
        }, 1000);

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
