<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Evolution 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 20px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.4); }
        
        #stats-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-around; padding: 15px; }
        .stat-item { text-align: center; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .val { font-weight: 900; font-size: 20px; color: #2c3e50; }
        
        .menu-popup { position: absolute; display: none; transform: translate(-50%, -130%); padding: 15px; z-index: 1000; min-width: 180px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-opt { width: 100%; margin: 6px 0; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-opt:active { transform: scale(0.95); }
        
        .btn-house { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-shop { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-upgrade { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; }
        .btn-sell { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        
        #timer-label { position: absolute; display: none; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(44, 62, 80, 0.9); color: #fff; padding: 12px 25px; border-radius: 50px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats-bar" class="glass">
            <div class="stat-item">
                <span class="label">Баланс</span>
                <span id="balance" class="val">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Доход/мин</span>
                <span id="income" class="val" style="color:#3498db">0</span>
            </div>
        </div>

        <div id="empty-menu" class="menu-popup glass">
            <button class="btn-opt btn-house" onclick="startBuild('house')">Дом (100$)</button>
            <button class="btn-opt btn-shop" onclick="startBuild('shop')">Магазин (300$)</button>
        </div>

        <div id="object-menu" class="menu-popup glass">
            <div id="obj-info" style="font-weight: bold; margin-bottom: 10px; text-align: center;">Lvl 1</div>
            <button class="btn-opt btn-upgrade" id="up-btn" onclick="upgradeObject()">Улучшить</button>
            <button class="btn-opt btn-sell" onclick="sellObject()">Снести</button>
        </div>

        <div id="timer-label">Строим... 5с</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000;
        let incomePerMin = 0;
        let isBuilding = false;
        let selectedCell = null; 
        let selectedObject = null;

        // --- SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 25, 120);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(28, 28, 28);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(30, 50, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        scene.add(sun);

        // --- ENVIRONMENT ---
        // Остров
        const islandGeo = new THREE.CylinderGeometry(30, 32, 2, 40);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0x55aa55, roughness: 0.8 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.position.y = -1;
        island.receiveShadow = true;
        scene.add(island);

        // Море
        const seaGeo = new THREE.CircleGeometry(200, 32);
        const seaMat = new THREE.MeshStandardMaterial({ color: 0x0077be, transparent: true, opacity: 0.7 });
        const sea = new THREE.Mesh(seaGeo, seaMat);
        sea.rotation.x = -Math.PI/2;
        sea.position.y = -1.8;
        scene.add(sea);

        const buildingsGroup = new THREE.Group();
        scene.add(buildingsGroup);

        // Утилита для создания боксов
        function createPart(w, h, d, color, x=0, y=0, z=0) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // --- BUILD ENGINE ---
        function updateModel(group) {
            while(group.children.length > 0) group.remove(group.children[0]);
            const { type, lvl } = group.userData;

            if (type === 'house') {
                if (lvl === 1) {
                    group.add(createPart(1.6, 1.2, 1.6, 0xe6ccb2, 0, 0.6, 0)); // Стены
                    group.add(createPart(1.8, 0.2, 1.8, 0x8b4513, 0, 1.2, 0)); // Крыша
                } else if (lvl === 2) {
                    group.add(createPart(1.8, 2, 1.8, 0xffffff, 0, 1, 0)); // Стены
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(1.6, 1.2, 4), new THREE.MeshStandardMaterial({color: 0xaa0000}));
                    roof.position.y = 2.6; roof.rotation.y = Math.PI/4;
                    group.add(roof);
                    group.add(createPart(0.4, 0.4, 0.2, 0x88ccff, 0.5, 1.2, 0.85)); // Окно
                } else {
                    group.add(createPart(2.5, 1.5, 2.5, 0xf0f0f0, 0, 0.75, 0)); // 1 этаж
                    group.add(createPart(2, 1.2, 2, 0xffffff, 0, 2.1, 0)); // 2 этаж
                    group.add(createPart(0.5, 1, 0.5, 0x333333, 0.8, 2.5, -0.8)); // Труба
                    group.add(createPart(2.6, 0.1, 2.6, 0x222222, 0, 1.5, 0)); // Разделение
                }
            } else { // SHOP
                if (lvl === 1) {
                    group.add(createPart(1.8, 1.5, 1.8, 0x3498db, 0, 0.75, 0));
                    group.add(createPart(2, 0.3, 0.5, 0xf1c40f, 0, 1.2, 0.8)); // Козырек
                } else if (lvl === 2) {
                    group.add(createPart(2.2, 2, 2.2, 0xbdc3c7, 0, 1, 0));
                    group.add(createPart(1.5, 0.6, 0.2, 0x2ecc71, 0, 2.2, 1)); // Вывеска
                    group.add(createPart(1, 1.4, 0.1, 0xade8f4, -0.4, 0.7, 1.1)); // Витрина
                } else {
                    group.add(createPart(3.5, 3.5, 3, 0x2c3e50, 0, 1.75, 0)); // Корпус
                    group.add(createPart(3.7, 0.5, 3.2, 0xe74c3c, 0, 3.5, 0)); // Крыша ТЦ
                    group.add(createPart(3, 2, 0.2, 0x88ccff, 0, 1.5, 1.5)); // Большое стекло
                }
            }
            
            // Анимация появления
            group.scale.set(0,0,0);
            new AnimationProp(group.scale, {x:1, y:1, z:1}, 500);
        }

        // Простой хелпер для анимации
        function AnimationProp(obj, target, ms) {
            const start = {x: obj.x, y: obj.y, z: obj.z};
            const startTime = Date.now();
            function up() {
                const step = (Date.now() - startTime) / ms;
                if(step >= 1) { obj.set(target.x, target.y, target.z); return; }
                obj.set(start.x + (target.x-start.x)*step, start.y + (target.y-start.y)*step, start.z + (target.z-start.z)*step);
                requestAnimationFrame(up);
            }
            up();
        }

        // --- ЛОГИКА ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const hits = raycaster.intersectObjects([island, ...buildingsGroup.children], true);
            
            document.getElementById('empty-menu').style.display = 'none';
            document.getElementById('object-menu').style.display = 'none';

            if (hits.length > 0) {
                let obj = null;
                hits[0].object.traverseAncestors(a => { if(a.userData.type) obj = a; });

                if (obj) {
                    selectedObject = obj;
                    const menu = document.getElementById('object-menu');
                    document.getElementById('obj-info').innerText = `${obj.userData.type.toUpperCase()} LVL ${obj.userData.lvl}`;
                    document.getElementById('up-btn').innerText = obj.userData.lvl >= 3 ? "Макс. уровень" : `Улучшить (${(obj.userData.type==='house'?200:500)*obj.userData.lvl}$)`;
                    menu.style.display = 'block';
                    menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
                } else {
                    if(isBuilding) return;
                    selectedCell = { x: Math.round(hits[0].point.x/4)*4, z: Math.round(hits[0].point.z/4)*4 };
                    const menu = document.getElementById('empty-menu');
                    menu.style.display = 'block';
                    menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
                }
            }
        });

        function startBuild(type) {
            const cost = type === 'house' ? 100 : 300;
            if (balance < cost) return;
            balance -= cost;
            isBuilding = true;
            document.getElementById('empty-menu').style.display = 'none';
            updateUI();
            
            const timer = document.getElementById('timer-label');
            timer.style.display = 'block';
            let time = 5;
            let int = setInterval(() => {
                time--; timer.innerText = `Строим... ${time}с`;
                if(time <= 0) {
                    clearInterval(int);
                    timer.style.display = 'none';
                    spawn(selectedCell.x, selectedCell.z, type);
                    isBuilding = false;
                }
            }, 1000);
        }

        function spawn(x, z, type) {
            const group = new THREE.Group();
            group.userData = { type, lvl: 1 };
            group.position.set(x, 0, z);
            updateModel(group);
            buildingsGroup.add(group);
            incomePerMin += (type === 'house' ? 10 : 30);
            updateUI();
        }

        function upgradeObject() {
            if (selectedObject.userData.lvl >= 3) return;
            const cost = (selectedObject.userData.type === 'house' ? 200 : 500) * selectedObject.userData.lvl;
            if (balance < cost) return;
            
            balance -= cost;
            selectedObject.userData.lvl++;
            incomePerMin += (selectedObject.userData.type === 'house' ? 15 : 40);
            updateModel(selectedObject);
            document.getElementById('object-menu').style.display = 'none';
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function sellObject() {
            incomePerMin -= (selectedObject.userData.type === 'house' ? 10 : 30) * selectedObject.userData.lvl;
            balance += (selectedObject.userData.type === 'house' ? 50 : 150);
            buildingsGroup.remove(selectedObject);
            document.getElementById('object-menu').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance) + "$";
            document.getElementById('income').innerText = "+" + incomePerMin;
        }

        setInterval(() => { balance += incomePerMin/6; updateUI(); }, 10000); // Начисление каждые 10 сек

        function animate() {
            requestAnimationFrame(animate);
            sea.position.y = -1.8 + Math.sin(Date.now() * 0.001) * 0.05; // Эффект волн
            renderer.render(scene, camera);
        }
        updateUI();
        animate();
    </script>
</body>
</html>
