<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vens Land: Fixed Build</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 15px; pointer-events: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        
        #stats { position: absolute; top: 15px; left: 15px; padding: 12px 20px; font-weight: bold; border-left: 4px solid #2ecc71; }
        
        /* Кнопка постройки */
        #build-menu { 
            position: absolute; display: none; transform: translate(-50%, -120%); 
            padding: 10px; z-index: 1000; text-align: center;
        }
        .btn-build { 
            background: #2ecc71; color: white; border: none; padding: 12px 25px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        #timer-label {
            position: absolute; display: none; transform: translate(-50%, -150%);
            background: #1a1a1a; color: #ffcc00; padding: 5px 15px;
            border-radius: 8px; font-weight: bold; pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats" class="glass">БАЛАНС: <span id="balance">0</span> $</div>
        
        <div id="build-menu" class="glass">
            <button class="btn-build" id="main-build-btn">ПОСТРОИТЬ (100$)</button>
        </div>

        <div id="timer-label">СТРОЙКА: 5с</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000000; 
        let selectedCell = { x: 0, z: 0 };
        let occupiedCells = new Set();

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 18, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // Поле
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x55aa44 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Яркая сетка
        const grid = new THREE.GridHelper(40, 20, 0xffffff, 0x448833);
        grid.position.y = 0.05;
        scene.add(grid);

        const buildings = new THREE.Group();
        scene.add(buildings);

        // --- ЛОГИКА КЛИКА ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Важно: слушаем клик на renderer, а не на window
        renderer.domElement.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            const menu = document.getElementById('build-menu');

            if (intersects.length > 0) {
                let gx = Math.round(intersects[0].point.x / 2) * 2;
                let gz = Math.round(intersects[0].point.z / 2) * 2;

                if (occupiedCells.has(`${gx},${gz}`)) {
                    menu.style.display = 'none';
                    return;
                }

                selectedCell.x = gx;
                selectedCell.z = gz;

                menu.style.display = 'block';
                menu.style.left = event.clientX + 'px';
                menu.style.top = event.clientY + 'px';
            } else {
                menu.style.display = 'none';
            }
        });

        // Привязываем функцию к кнопке через JS, чтобы избежать проблем с областями видимости
        document.getElementById('main-build-btn').onclick = function() {
            if (balance < 100) return alert("Мало денег!");
            
            balance -= 100;
            const cellKey = `${selectedCell.x},${selectedCell.z}`;
            occupiedCells.add(cellKey);
            
            document.getElementById('build-menu').style.display = 'none';
            updateUI();

            // Создаем каркас
            const ghost = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.2, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffaa00 })
            );
            ghost.position.set(selectedCell.x, 0.1, selectedCell.z);
            scene.add(ghost);

            // Показываем таймер
            const timerLabel = document.getElementById('timer-label');
            timerLabel.style.display = 'block';
            timerLabel.style.left = "50%";
            timerLabel.style.top = "50%";
            
            let timeLeft = 5;
            timerLabel.innerText = `СТРОЙКА: ${timeLeft}с`;

            let buildInt = setInterval(() => {
                timeLeft--;
                timerLabel.innerText = `СТРОЙКА: ${timeLeft}с`;
                
                if (timeLeft <= 0) {
                    clearInterval(buildInt);
                    scene.remove(ghost);
                    timerLabel.style.display = 'none';
                    spawnHouse(selectedCell.x, selectedCell.z);
                }
            }, 1000);
            
            tg.HapticFeedback.impactOccurred('medium');
        };

        function spawnHouse(x, z) {
            const house = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 1.4, 1.6),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            body.position.y = 0.7;
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(1.3, 0.8, 4),
                new THREE.MeshStandardMaterial({ color: 0xaa3333 })
            );
            roof.position.y = 1.5;
            roof.rotation.y = Math.PI/4;

            house.add(body, roof);
            house.position.set(x, 0, z);
            buildings.add(house);
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
