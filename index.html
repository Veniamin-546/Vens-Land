<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsleBuilder: Живой город EVO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .building-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            border: 1px solid transparent;
        }
        .building-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .building-card.active {
            background: rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.6);
            transform: scale(1.05);
        }

        #ui-layer {
            pointer-events: none;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            color: white;
            z-index: 10;
        }
        #ui-layer > * { pointer-events: auto; }
        .stat-value { font-variant-numeric: tabular-nums; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="flex justify-between items-start">
        <div class="glass rounded-3xl p-5 flex gap-10">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400 mb-1">Бюджет</span>
                <span class="text-2xl font-black stat-value" id="stat-money">$10,000</span>
            </div>
            <div class="flex flex-col border-l border-white/10 pl-10">
                <span class="text-[10px] font-bold uppercase tracking-widest text-green-400 mb-1">Прибыль</span>
                <span class="text-2xl font-black stat-value text-green-400" id="stat-income">+$50</span>
            </div>
            <div class="flex flex-col border-l border-white/10 pl-10">
                <span class="text-[10px] font-bold uppercase tracking-widest text-purple-400 mb-1">Жители</span>
                <span class="text-2xl font-black stat-value" id="stat-pop">0</span>
            </div>
        </div>
        
        <div class="glass rounded-2xl p-4 text-right min-w-[150px]">
            <h1 class="text-xl font-black tracking-tighter uppercase italic text-blue-500">IsleBuilder</h1>
            <p id="time-display" class="text-xs font-bold opacity-80">День 12:00</p>
        </div>
    </div>

    <div class="flex justify-center gap-4 mb-4">
        <div class="glass rounded-[2.5rem] p-3 flex gap-3">
            <div onclick="selectBuilding('residence')" id="btn-residence" class="building-card active rounded-3xl px-6 py-3 text-center">
                <div class="text-2xl mb-1">🏘️</div>
                <div class="text-[10px] font-black uppercase mt-0.5">Дом</div>
                <div class="text-[10px] text-blue-400 font-bold">$500</div>
            </div>
            <div onclick="selectBuilding('commercial')" id="btn-commercial" class="building-card rounded-3xl px-6 py-3 text-center">
                <div class="text-2xl mb-1">🏢</div>
                <div class="text-[10px] font-black uppercase mt-0.5">Офис</div>
                <div class="text-[10px] text-blue-400 font-bold">$1.5k</div>
            </div>
            <div onclick="selectBuilding('industrial')" id="btn-industrial" class="building-card rounded-3xl px-6 py-3 text-center">
                <div class="text-2xl mb-1">🏭</div>
                <div class="text-[10px] font-black uppercase mt-0.5">Завод</div>
                <div class="text-[10px] text-blue-400 font-bold">$3k</div>
            </div>
            <div class="w-px h-12 bg-white/10 my-auto mx-1"></div>
            <div onclick="selectBuilding('demolish')" id="btn-demolish" class="building-card rounded-3xl px-6 py-3 text-center">
                <div class="text-2xl mb-1">💣</div>
                <div class="text-[10px] font-black uppercase text-red-500 mt-0.5">Снос</div>
            </div>
        </div>
    </div>
</div>

<script>
const Game = {
    money: 10000,
    income: 0,
    population: 0,
    selectedType: 'residence',
    cellSize: 4, 
    buildings: [],
    roads: new Map(),
    cars: [],
    dayTime: 12, // 0 to 24
    buildingData: {
        residence: { cost: 500, baseIncome: -10, basePop: 50, color: 0xe2e8f0, roof: 0x991b1b },
        commercial: { cost: 1500, baseIncome: 200, basePop: 0, color: 0x334155, accent: 0x3b82f6 },
        industrial: { cost: 3000, baseIncome: 450, basePop: -20, color: 0x475569, chimney: 0x1e293b },
        demolish: { cost: 0, income: 0, pop: 0 }
    }
};

let scene, camera, renderer, controls, raycaster, mouse;
let island, ghostBuilding, hoverMesh, sunLight, ambientLight;
const objects = []; 
let mousePosOnDown = { x: 0, y: 0 };

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(60, 60, 60);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.1;

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    setupLights();
    createEnvironment();
    createGridSystem();
    
    window.addEventListener('resize', onWindowResize);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerdown', (e) => { mousePosOnDown = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('pointerup', onPointerUp);

    animate();
    setInterval(gameTick, 2000);
}

function setupLights() {
    ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -60;
    sunLight.shadow.camera.right = 60;
    sunLight.shadow.camera.top = 60;
    sunLight.shadow.camera.bottom = -60;
    scene.add(sunLight);
}

function createEnvironment() {
    const ocean = new THREE.Mesh(
        new THREE.CircleGeometry(1000, 32),
        new THREE.MeshStandardMaterial({ color: 0x0a1e3f, roughness: 0.1, metalness: 0.2 })
    );
    ocean.rotation.x = -Math.PI / 2;
    ocean.position.y = -0.5;
    scene.add(ocean);

    const islandBase = new THREE.Mesh(
        new THREE.CylinderGeometry(45, 50, 8, 32),
        new THREE.MeshStandardMaterial({ color: 0x221a15 })
    );
    islandBase.position.y = -4;
    scene.add(islandBase);

    const grass = new THREE.Mesh(
        new THREE.PlaneGeometry(80, 80),
        new THREE.MeshStandardMaterial({ color: 0x2d4c1e, roughness: 1 })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.receiveShadow = true;
    scene.add(grass);
    objects.push(grass); 
}

function createGridSystem() {
    const grid = new THREE.GridHelper(80, 80 / Game.cellSize, 0xffffff, 0x333333);
    grid.material.opacity = 0.1;
    grid.material.transparent = true;
    grid.position.y = 0.01;
    scene.add(grid);

    hoverMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(Game.cellSize - 0.2, Game.cellSize - 0.2),
        new THREE.MeshBasicMaterial({ color: 0x3b82f6, opacity: 0.3, transparent: true })
    );
    hoverMesh.rotation.x = -Math.PI / 2;
    hoverMesh.position.y = 0.05;
    scene.add(hoverMesh);

    ghostBuilding = new THREE.Group();
    scene.add(ghostBuilding);
}

// Модифицированная функция создания мешей зданий
function createBuildingMesh(type, level = 1, isGhost = false) {
    const group = new THREE.Group();
    const config = Game.buildingData[type];
    const opacity = isGhost ? 0.4 : 1.0;
    
    const mat = new THREE.MeshStandardMaterial({ color: config.color, transparent: isGhost, opacity: opacity });
    const windowMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0 });

    const w = Game.cellSize * 0.65;
    const h = (type === 'residence' ? 1.2 : (type === 'commercial' ? 3.0 : 2.0)) * (1 + (level-1)*0.4);

    if (type === 'residence') {
        // Уютный домик с крышей
        const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
        body.position.y = h/2;
        group.add(body);

        // Крыша
        const roofGeom = new THREE.ConeGeometry(w * 0.8, h * 0.5, 4);
        const roofMat = new THREE.MeshStandardMaterial({ color: config.roof, transparent: isGhost, opacity: opacity });
        const roof = new THREE.Mesh(roofGeom, roofMat);
        roof.position.y = h + (h * 0.2);
        roof.rotation.y = Math.PI / 4;
        group.add(roof);

        // Пристройка (крыльцо/гараж)
        const ann = new THREE.Mesh(new THREE.BoxGeometry(w * 0.4, h * 0.5, w * 0.4), mat);
        ann.position.set(w * 0.4, h * 0.25, 0);
        group.add(ann);
    } 
    else if (type === 'commercial') {
        // Современный офис с деталями
        const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
        body.position.y = h/2;
        group.add(body);

        // Стеклянная вставка
        const glassMat = new THREE.MeshStandardMaterial({ color: config.accent, metalness: 0.8, roughness: 0.1, transparent: true, opacity: isGhost ? 0.2 : 0.6 });
        const glass = new THREE.Mesh(new THREE.BoxGeometry(w * 0.4, h, w + 0.02), glassMat);
        glass.position.y = h/2;
        group.add(glass);

        // Парапет на крыше
        const rim = new THREE.Mesh(new THREE.BoxGeometry(w + 0.1, 0.2, w + 0.1), mat);
        rim.position.y = h;
        group.add(rim);
    } 
    else if (type === 'industrial') {
        // Завод с трубами и секциями
        const body1 = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.7, w), mat);
        body1.position.y = (h * 0.7) / 2;
        group.add(body1);

        const body2 = new THREE.Mesh(new THREE.BoxGeometry(w * 0.6, h * 0.4, w * 0.6), mat);
        body2.position.set(0, h * 0.9, 0);
        group.add(body2);

        // Труба
        const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, h * 1.2), new THREE.MeshStandardMaterial({ color: config.chimney }));
        chimney.position.set(-w * 0.3, h * 0.6, -w * 0.3);
        group.add(chimney);

        // Полоски на трубе (декор)
        const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.21, 0.21, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        stripe.position.y = h * 1.1;
        chimney.add(stripe);
    }

    // Окна
    if (!isGhost) {
        const windowCount = Math.floor(h * 3);
        for(let i=0; i < windowCount; i++) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.2), windowMat.clone());
            win.userData.isWindow = true;
            const side = i % 4;
            const yPos = 0.4 + (Math.floor(i/4) * 0.6);
            if(yPos > h - 0.3) continue;

            const offset = w/2 + 0.02;
            if(side === 0) win.position.set((Math.random()-0.5)*w*0.6, yPos, offset);
            if(side === 1) { win.position.set((Math.random()-0.5)*w*0.6, yPos, -offset); win.rotation.y = Math.PI; }
            if(side === 2) { win.position.set(offset, yPos, (Math.random()-0.5)*w*0.6); win.rotation.y = Math.PI/2; }
            if(side === 3) { win.position.set(-offset, yPos, (Math.random()-0.5)*w*0.6); win.rotation.y = -Math.PI/2; }
            group.add(win);
        }
    }

    group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = !isGhost; } });
    return group;
}

function updateRoads() {
    Game.roads.forEach(r => scene.remove(r.mesh));
    Game.roads.clear();
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });

    Game.buildings.forEach((b1, i) => {
        Game.buildings.forEach((b2, j) => {
            if (i >= j) return;
            const dx = Math.abs(b1.gx - b2.gx);
            const dz = Math.abs(b1.gz - b2.gz);

            if ((dx === 1 && dz === 0) || (dx === 0 && dz === 1)) {
                const rx = (b1.posX + b2.posX) / 2;
                const rz = (b1.posZ + b2.posZ) / 2;
                const key = `${rx.toFixed(1)}_${rz.toFixed(1)}`;
                
                if (!Game.roads.has(key)) {
                    const isX = dx === 1;
                    const road = new THREE.Mesh(
                        new THREE.PlaneGeometry(isX ? Game.cellSize : 1.8, isX ? 1.8 : Game.cellSize), 
                        roadMat
                    );
                    road.rotation.x = -Math.PI / 2;
                    road.position.set(rx, 0.02, rz);
                    scene.add(road);
                    Game.roads.set(key, { mesh: road, x: rx, z: rz, isX: isX });
                }
            }
        });
    });
}

function spawnCar() {
    if (Game.roads.size === 0) return;
    const roadArray = Array.from(Game.roads.values());
    const r = roadArray[Math.floor(Math.random() * roadArray.length)];
    
    const carGroup = new THREE.Group();
    const carBody = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.3, 0.35),
        new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.8, 0.5) })
    );
    carGroup.add(carBody);
    
    const headLight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.25), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));
    headLight.position.set(0.35, 0, 0);
    headLight.userData.isCarLight = true;
    carGroup.add(headLight);

    carGroup.position.set(r.x, 0.2, r.z);
    if (!r.isX) carGroup.rotation.y = Math.PI / 2;
    
    scene.add(carGroup);
    Game.cars.push({ mesh: carGroup, road: r, dir: Math.random() > 0.5 ? 1 : -1 });
}

function onPointerMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects);
    if (intersects.length > 0) {
        const p = intersects[0].point;
        const gx = Math.round(p.x / Game.cellSize);
        const gz = Math.round(p.z / Game.cellSize);
        hoverMesh.position.set(gx * Game.cellSize, 0.05, gz * Game.cellSize);
        ghostBuilding.position.set(gx * Game.cellSize, 0, gz * Game.cellSize);
        hoverMesh.visible = true;
        ghostBuilding.visible = (Game.selectedType !== 'demolish');
    }
}

function onPointerUp(event) {
    const dist = Math.hypot(event.clientX - mousePosOnDown.x, event.clientY - mousePosOnDown.y);
    if (dist > 8) return; 

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects);
    if (intersects.length > 0) {
        const p = intersects[0].point;
        const gx = Math.round(p.x / Game.cellSize);
        const gz = Math.round(p.z / Game.cellSize);
        const gridId = `${gx}_${gz}`;
        const existing = Game.buildings.find(b => b.id === gridId);

        if (Game.selectedType === 'demolish') {
            if (existing) removeBuilding(gridId);
        } else {
            if (existing) upgradeBuilding(existing);
            else placeBuilding(gx, gz, gridId);
        }
    }
}

function placeBuilding(gx, gz, id) {
    const config = Game.buildingData[Game.selectedType];
    if (Game.money < config.cost) return;
    Game.money -= config.cost;
    const px = gx * Game.cellSize;
    const pz = gz * Game.cellSize;
    const mesh = createBuildingMesh(Game.selectedType, 1);
    mesh.position.set(px, 0, pz);
    scene.add(mesh);
    Game.buildings.push({ id, gx, gz, posX: px, posZ: pz, type: Game.selectedType, mesh, level: 1 });
    updateRoads();
    updateStats();
}

function upgradeBuilding(b) {
    const cost = Math.floor(Game.buildingData[b.type].cost * b.level);
    if (Game.money < cost || b.level >= 5) return;
    Game.money -= cost;
    b.level++;
    scene.remove(b.mesh);
    b.mesh = createBuildingMesh(b.type, b.level);
    b.mesh.position.set(b.posX, 0, b.posZ);
    scene.add(b.mesh);
    updateStats();
}

function removeBuilding(id) {
    const idx = Game.buildings.findIndex(b => b.id === id);
    if(idx === -1) return;
    scene.remove(Game.buildings[idx].mesh);
    Game.buildings.splice(idx, 1);
    updateRoads();
    updateStats();
}

function selectBuilding(type) {
    Game.selectedType = type;
    document.querySelectorAll('.building-card').forEach(el => el.classList.remove('active'));
    document.getElementById(`btn-${type}`).classList.add('active');
    while(ghostBuilding.children.length > 0) ghostBuilding.remove(ghostBuilding.children[0]);
    if (type !== 'demolish') ghostBuilding.add(createBuildingMesh(type, 1, true));
}

function updateStats() {
    let income = 0; let pop = 0;
    Game.buildings.forEach(b => { 
        income += Game.buildingData[b.type].baseIncome * b.level; 
        pop += Game.buildingData[b.type].basePop * b.level; 
    });
    Game.income = income;
    Game.population = Math.max(0, pop);
    document.getElementById('stat-money').innerText = `$${Math.floor(Game.money).toLocaleString()}`;
    document.getElementById('stat-income').innerText = (income >= 0 ? '+' : '') + `$${income}`;
    document.getElementById('stat-pop').innerText = pop.toLocaleString();
}

function gameTick() {
    Game.money += Game.income / 5;
    updateStats();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    
    // Система времени
    Game.dayTime = (Game.dayTime + 0.005) % 24;
    const isNight = Game.dayTime < 6 || Game.dayTime > 18;
    const timeText = (isNight ? "Ночь " : "День ") + Math.floor(Game.dayTime).toString().padStart(2, '0') + ":00";
    document.getElementById('time-display').innerText = timeText;

    // Освещение и небо
    const sunAngle = (Game.dayTime / 24) * Math.PI * 2 - Math.PI/2;
    sunLight.position.set(Math.cos(sunAngle) * 100, Math.sin(sunAngle) * 100, 50);
    const sunIntensity = Math.max(0, Math.sin(sunAngle));
    sunLight.intensity = sunIntensity * 1.2;
    ambientLight.intensity = 0.2 + sunIntensity * 0.4;
    
    const skyColor = new THREE.Color().setHSL(0.55, 0.4, 0.05 + sunIntensity * 0.55);
    scene.background = skyColor;

    // Свет в окнах и фары
    const winOpacity = isNight ? 1.0 : 0;
    scene.traverse(obj => {
        if(obj.userData.isWindow) obj.material.opacity = winOpacity;
        if(obj.userData.isCarLight) obj.material.opacity = isNight ? 1 : 0;
    });

    // Движение машин
    if (Game.roads.size > 0 && Game.cars.length < Game.roads.size * 1.5) spawnCar();

    Game.cars.forEach((car, idx) => {
        const speed = 0.07;
        if (car.road.isX) {
            car.mesh.position.x += speed * car.dir;
            if (Math.abs(car.mesh.position.x - car.road.x) > Game.cellSize/2 - 0.4) car.dir *= -1;
        } else {
            car.mesh.position.z += speed * car.dir;
            if (Math.abs(car.mesh.position.z - car.road.z) > Game.cellSize/2 - 0.4) car.dir *= -1;
        }
    });

    renderer.render(scene, camera);
}

init();
selectBuilding('residence');
</script>
</body>
</html>
